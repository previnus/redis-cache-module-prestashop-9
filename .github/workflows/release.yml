name: Create Release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        run: |
          VERSION=$(grep -oP "(?<=version = ')[^']+" rediscache.php | head -1)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Found version: $VERSION"

      - name: Delete bad releases
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete "v" --yes --cleanup-tag 2>/dev/null || true

      - name: Check if release exists
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Build module zip
        run: |
          mkdir -p /tmp/build/rediscache
          cp -r $(ls | grep -v '^\.$' | grep -v '^\.git$') /tmp/build/rediscache/
          cd /tmp/build
          zip -r rediscache-v${{ steps.version.outputs.version }}.zip rediscache/

      - name: Create release
        if: steps.check.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --notes-file .github/release-notes.md \
            --target main \
            /tmp/build/rediscache-v${{ steps.version.outputs.version }}.zip
